    <!-- Animated Favicon -->
    <script>
      // Favicon animation - subtle pulse effect
      let faviconPulse = 0;
      let pulseDirection = 1;
      
      function animateFavicon() {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = '/images/367f316379e78929865b1677b6370686.jpg';
        
        img.onload = function() {
          setInterval(() => {
            // Clear canvas
            ctx.clearRect(0, 0, 64, 64);
            
            // Update pulse
            faviconPulse += pulseDirection * 0.02;
            if (faviconPulse >= 1) pulseDirection = -1;
            if (faviconPulse <= 0) pulseDirection = 1;
            
            // Calculate scale with subtle pulse (0.95 to 1.05)
            const scale = 0.95 + (faviconPulse * 0.1);
            const offset = (64 - (64 * scale)) / 2;
            
            // Draw image with scale
            ctx.drawImage(img, offset, offset, 64 * scale, 64 * scale);
            
            // Update favicon
            const favicon = document.getElementById('favicon');
            if (favicon) {
              favicon.href = canvas.toDataURL('image/png');
            }
          }, 50); // 20 FPS for smooth animation
        };
      }
      
      // Start animation when page loads
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', animateFavicon);
      } else {
        animateFavicon();
      }
    </script>
