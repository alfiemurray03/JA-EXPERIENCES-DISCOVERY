  <rect x="326" y="154" width="498" height="274" rx="24" fill="white" stroke="#D8E2F2"/>
  <text x="360" y="198" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">Family day out planner</text>
