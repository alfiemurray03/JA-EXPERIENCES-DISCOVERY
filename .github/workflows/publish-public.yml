name: Publish Cloudflare Pages Bundle

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-public:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build deployable public bundle
        run: npm run build

      - name: Verify plans and recovery assets are compiled
        shell: bash
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/.asset-manifest.json

          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          import path from 'node:path';

          const manifest = JSON.parse(await readFile('public/.asset-manifest.json', 'utf8'));
          if (manifest.version !== 2 || !Array.isArray(manifest.currentAssets)) {
            throw new Error('The production asset manifest is not the current version 2 format.');
          }

          const assets = [...new Set(manifest.currentAssets)];
          if (assets.length !== manifest.currentAssets.length) {
            throw new Error('The production asset manifest contains duplicate entries.');
          }
          if (assets.length === 0 || assets.length > 500) {
            throw new Error(`Unexpected current production asset count: ${assets.length}.`);
          }

          const JavaScriptAssets = assets.filter(asset => asset.startsWith('assets/') && asset.endsWith('.js'));
          if (JavaScriptAssets.length === 0) {
            throw new Error('No current JavaScript production assets were recorded.');
          }

          const bundles = await Promise.all(JavaScriptAssets.map(async asset => ({
            asset,
            content: await readFile(path.join('public', asset), 'utf8'),
          })));

          const requiredMarkers = [
            'Standard Plans',
            'Business Plans',
            'accountType=',
            'Secure application recovery',
            'analytics-compat-refresh',
          ];

          for (const marker of requiredMarkers) {
            if (!bundles.some(({ content }) => content.includes(marker))) {
              throw new Error(`Current production assets do not contain required marker: ${marker}`);
            }
          }
          NODE

          grep -F "planyx-shell-v7" public/sw.js >/dev/null
          grep -F "if (isAdminRoute(url.pathname)) return false;" public/sw.js >/dev/null
          grep -F "fetch(request, { cache: 'no-store', redirect: 'follow' })" public/sw.js >/dev/null

      - name: Upload deployable bundle
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-public-${{ github.sha }}
          path: public/
          if-no-files-found: error
          retention-days: 7

      - name: Commit refreshed public bundle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A public
          if git diff --cached --quiet; then
            echo 'The committed public bundle is already current.'
            exit 0
          fi
          git commit -m 'Build production public bundle [skip public-build]'
          git push origin "HEAD:${GITHUB_REF_NAME}"
